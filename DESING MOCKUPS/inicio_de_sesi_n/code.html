<body class="bg-primary-container text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center relative overflow-hidden selection:bg-secondary selection:text-on-secondary">
<!-- Background Gradients -->
<div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
<div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-container opacity-5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] rounded-full bg-tertiary-container opacity-10 blur-[100px]"></div>
</div>
<main class="w-full max-w-md px-margin-mobile md:px-0 z-10">
<!-- Logo Area -->
<div class="flex flex-col items-center mb-md text-center">
<div class="w-16 h-16 rounded-xl bg-surface-container flex items-center justify-center mb-sm shadow-xl border border-white/5 glow-effect">
<span class="material-symbols-outlined text-[32px] text-secondary">account_balance_wallet</span>
</div>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-secondary">OrganizateRD</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Bienvenido de nuevo</p>
</div>
<!-- Login Form Container -->
<div class="glass-panel rounded-[16px] p-md md:p-lg shadow-[0_20px_40px_rgba(0,0,0,0.4)]">
<form class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Correo Electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant text-[20px]">mail</span>
<input class="input-dark w-full h-12 rounded-lg border border-white/10 pl-xl pr-sm text-on-surface font-body-md focus:border-tertiary focus:ring-1 focus:ring-tertiary transition-all outline-none" id="email" placeholder="ejemplo@empresa.com" type="email">
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Contraseña</label>
<a class="font-label-md text-label-md text-tertiary hover:text-tertiary-fixed transition-colors" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant text-[20px]">lock</span>
<input class="input-dark w-full h-12 rounded-lg border border-white/10 pl-xl pr-sm text-on-surface font-body-md focus:border-tertiary focus:ring-1 focus:ring-tertiary transition-all outline-none" id="password" placeholder="••••••••" type="password">
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-12 mt-xs bg-secondary hover:bg-secondary-fixed text-on-secondary font-label-md text-label-md rounded-lg flex items-center justify-center gap-xs transition-all active:scale-[0.98]" type="submit">
                    Iniciar Sesión
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-sm my-md">
<div class="flex-1 h-px bg-white/5"></div>
<span class="font-label-md text-label-md text-outline-variant">o continuar con</span>
<div class="flex-1 h-px bg-white/5"></div>
</div>
<!-- Social Logins -->
<div class="flex gap-sm">
<button class="flex-1 h-12 rounded-lg border border-white/10 hover:bg-white/5 flex items-center justify-center gap-sm transition-colors text-on-surface font-label-md text-label-md" type="button">

</div>

<div class="mt-md text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                ¿No tienes una cuenta? 
                <a class="text-secondary font-bold hover:text-secondary-fixed transition-colors" href="#">Registrarme</a>
</p>

<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span class="font-label-md text-[12px] uppercase tracking-wider">Acceso Seguro &amp; Encriptado</span>
</div>
